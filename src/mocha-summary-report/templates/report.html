<html>
  <head>
    <title>Summary Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      .panel-body { font-size: 12px; padding: 10px }
      .panel-heading { font-size: 12px; padding: 10px }
      .stripes { height: 100%; width: 100%; background: repeating-linear-gradient(60deg, #eeeeee 1px, white 6px); }
      .no-margin { margin: 0px; max-width: "none" }
      .font-size-normal { font-size: 100%; font-weight: normal; }
      .font-size-125em { font-size: 1.25em; font-weight: normal; line-height: 150% }
      .font-size-085em { font-size: 0.85em; font-weight: normal; line-height: 150%; }
      .font-size-075em { font-size: 0.75em; font-weight: normal; line-height: 150%; }
      .font-size-06em { font-size: 0.6em; font-weight: normal; line-height: 150%; }
      .padding-left-right-15 { padding-left: 15px; padding-right: 15px; }
      .padding-top-bottom-15 {padding-top: 15px; padding-bottom: 15px; max-width: none;}
      .padding-left-right-10 { padding-left: 10px; padding-right: 10px; }
      .padding-left-right-5 { padding-left: 5px; padding-right: 5px; }
      .ellipsis { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .padding-top-bottom-5 { padding-top: 5px; padding-bottom: 5px; min-height: 4em; }
      .padding-bottom-5 { padding-bottom: 5px; min-height: 4em; }
      .overflow-scroll { overflow-y: scroll; overflow-x: hidden; min-height: 1em; }
      .right { text-align: right; }
      .percentage { font-size: 1.25em; }
      .percentageTitle { font-size: 0.9em; }
      .md-percentage { font-size: 30px; padding-bottom: 5px; }
      .sm-percentage { font-size: 18px; padding-bottom: 20px }
      .xs-percentage { font-size: 16px; padding-bottom: 20px }
      .bg-green { background-color: #5cb85c; color: white; padding: 7px; border-radius: 4px; }
      .bg-red { background-color: #d9534f; color: white; padding: 7px; border-radius: 4px; }
      .bg-amber { background-color: #f0ad4e; color: white; padding: 7px; border-radius: 4px; }
      .label-padded { padding: 7px 50px; font-size: 100%; font-weight: 550; }
      .table-font-14 { font-size: 14px; }
      .icon { width:4em; height: 4em; }
      .table-padding-5 {padding: 5px}
      .label-flaky {background-color: orangered;}
      .label-test-phase {background-color: darkgrey;}
    </style>
  </head>

  <body class="stripes">
    <br /><br />

    <!-- Suite details -->
    <div class="container padding-left-right-15 padding-top-bottom-15">
      {{{info}}}
      {{{ciServer}}}
    </div>
    <div class="clearfix"></div>

    <!-- SUMMARY -->
    <div class="container padding-left-right-15 padding-top-bottom-15">
      {{{summary}}}
    </div>
    <div class="clearfix"></div>

    <!-- Test Cases -->
    <div class="container padding-left-right-15 padding-top-bottom-15">
          {{{tests}}}
    </div>
    <div class="clearfix"></div>

  </body>
</html>
